# ============================================================
# ARKON — GitHub Actions: Deploy ke Azure for Students
# ============================================================
# Setup sekali:
#   1. Di Azure Portal → App Service → Get publish profile
#   2. Di GitHub → Settings → Secrets → Actions:
#      - AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND  (dari App Service backend)
#      - AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND (dari App Service frontend)
#      - AZURE_STATIC_WEB_APPS_API_TOKEN       (jika pakai Static Web Apps)
#   3. Set AZURE_BACKEND_URL dan AZURE_FRONTEND_URL sesuai resource Anda
# ============================================================

name: ARKON Azure Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger dari GitHub Actions UI

env:
  NODE_VERSION: '20'
  AZURE_BACKEND_APP_NAME: 'arkon-backend'    # Ganti dengan nama App Service Anda
  AZURE_FRONTEND_APP_NAME: 'arkon-frontend'  # Ganti dengan nama App Service Anda

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Test Backend sebelum deploy
  # ──────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: arkon_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: arch-ai-backend/package-lock.json

      - name: Install backend deps
        working-directory: arch-ai-backend
        run: npm ci

      - name: Run backend tests
        working-directory: arch-ai-backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: arkon_test
          JWT_SECRET: test-secret-minimum-64-chars-1234567890abcdefghijklmnopqrstuvwxyz
          REFRESH_SECRET: test-refresh-minimum-64-chars-1234567890abcdefghijklmnopqrstuvwxyz
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        run: npm test -- --passWithNoTests

  # ──────────────────────────────────────────────────────────
  # JOB 2: Build Frontend
  # ──────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build frontend
        # VITE_API_URL harus mengarah ke backend Azure Anda
        # Contoh: https://arkon-backend.azurewebsites.net
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.AZURE_BACKEND_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # JOB 3: Deploy Backend ke Azure App Service
  # ──────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Azure
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install production deps
        working-directory: arch-ai-backend
        run: npm ci --only=production

      # Option A: Deploy via Azure Web App publish profile
      - name: Deploy to Azure Web App (Backend)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}
          package: ./arch-ai-backend

      # Option B: Jika pakai Azure Container Apps (uncomment jika perlu)
      # - name: Login to Azure Container Registry
      #   uses: azure/docker-login@v1
      #   with:
      #     login-server: ${{ secrets.ACR_LOGIN_SERVER }}
      #     username: ${{ secrets.ACR_USERNAME }}
      #     password: ${{ secrets.ACR_PASSWORD }}
      # - run: |
      #     docker build -f arch-ai-backend/Dockerfile -t ${{ secrets.ACR_LOGIN_SERVER }}/arkon-backend:${{ github.sha }} ./arch-ai-backend
      #     docker push ${{ secrets.ACR_LOGIN_SERVER }}/arkon-backend:${{ github.sha }}

  # ──────────────────────────────────────────────────────────
  # JOB 4: Deploy Frontend ke Azure Static Web Apps
  # ──────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Azure
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      # Option A: Azure Static Web Apps (direkomendasikan untuk frontend React)
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true  # Sudah di-build di job sebelumnya

      # Option B: Azure App Service untuk frontend (uncomment jika perlu)
      # - name: Deploy Frontend to Azure App Service
      #   uses: azure/webapps-deploy@v3
      #   with:
      #     app-name: ${{ env.AZURE_FRONTEND_APP_NAME }}
      #     publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND }}
      #     package: ./dist

  # ──────────────────────────────────────────────────────────
  # JOB 5: Post-deploy health check
  # ──────────────────────────────────────────────────────────
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Wait for Azure to start services (cold start ~60s)
        run: sleep 90

      - name: Check backend health
        run: |
          BACKEND_URL="${{ secrets.AZURE_BACKEND_URL }}"
          echo "Checking: $BACKEND_URL/api/health"
          
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/api/health" --max-time 30)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "⏳ Attempt $i: HTTP $STATUS — waiting 30s..."
            sleep 30
          done
          
          echo "❌ Backend health check failed after 5 attempts"
          exit 1

      - name: Verify Redis connection
        run: |
          HEALTH=$(curl -s "${{ secrets.AZURE_BACKEND_URL }}/api/health")
          REDIS_STATUS=$(echo "$HEALTH" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('redis',{}).get('status','unknown'))")
          echo "Redis status: $REDIS_STATUS"
          if [ "$REDIS_STATUS" != "connected" ]; then
            echo "⚠️  Redis not connected — check REDIS_URL in Azure App Service configuration"
          fi
