name: Deploy ARKON Backend to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: arch-ai-backend/package-lock.json

      - name: Install dependencies
        working-directory: arch-ai-backend
        run: npm ci --omit=dev

      - name: Deploy ke Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'arkon-backend'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: arch-ai-backend