name: ARKON CI/CD Pipeline

on:
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ==========================================
  # JOB 1: Backend Tests
  # ==========================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: arkon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: arch-ai-backend/package-lock.json
      
      - name: Install dependencies
        working-directory: arch-ai-backend
        run: npm ci
      
      - name: Run migrations
        working-directory: arch-ai-backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_NAME: arkon_test
        run: node run_migration.js
      
      - name: Run tests
        working-directory: arch-ai-backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_NAME: arkon_test
          JWT_SECRET: test-jwt-secret-minimum-64-characters-for-security-compliance-12345678
          REFRESH_SECRET: test-refresh-secret-minimum-64-characters-for-security-compliance-12345
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        run: npm test -- --ci --coverage
      
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: arch-ai-backend/coverage/

  # ==========================================
  # JOB 2: Frontend Build
  # ==========================================
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.arkon.app
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

  # ==========================================
  # JOB 3: Lint
  # ==========================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint || true  # Don't fail on lint warnings for now

  # ==========================================
  # JOB 4: Docker Build Verification
  # ==========================================
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build backend Docker image
        run: docker build -t arkon-backend ./arch-ai-backend
      
      - name: Build frontend Docker image
        run: docker build -t arkon-frontend -f Dockerfile.frontend .
      
      - name: Docker compose config validation
        run: docker compose -f docker-compose.prod.yml config

  # ==========================================
  # JOB 5: Deploy to Staging (manual trigger)
  # ==========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      
      # Add your deployment steps here based on your cloud provider
      # Examples: Railway, Render, AWS, etc.
      - name: Deploy notification
        run: echo "🚀 Ready for staging deployment. Configure your cloud provider steps here."

  # ==========================================
  # JOB 6: E2E Tests (Playwright) — NFR-MAINT-002
  # ==========================================
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build-frontend, test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: arkon_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Install backend deps
        working-directory: arch-ai-backend
        run: npm ci

      - name: Run migrations
        working-directory: arch-ai-backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_NAME: arkon_test
        run: node run_migration.js

      - name: Start backend
        working-directory: arch-ai-backend
        env:
          PORT: 3000
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_NAME: arkon_test
          JWT_SECRET: test-jwt-secret-minimum-64-chars-for-e2e-testing-compliance-12345678
          REFRESH_SECRET: test-refresh-secret-minimum-64-chars-for-e2e-testing-compliance-12345
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          ENABLE_EMAIL_VERIFICATION: "false"
        run: node server.js &
      
      - name: Wait for backend
        run: npx wait-on http://localhost:3000/api/health --timeout 30000

      - name: Build and preview frontend
        run: npm run build && npm run preview &
        env:
          VITE_API_URL: http://localhost:3000

      - name: Wait for frontend
        run: npx wait-on http://localhost:4173 --timeout 30000

      - name: Run E2E tests
        run: npx playwright test --reporter=html
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
          API_URL: http://localhost:3000

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/reports/
          retention-days: 30

  # ==========================================
  # JOB 7: Migration Verify — NFR-MAINT-005
  # ==========================================
  verify-migrations:
    name: Verify Migration Checksums
    runs-on: ubuntu-latest
    needs: [test-backend]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: arkon_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend deps
        working-directory: arch-ai-backend
        run: npm ci

      - name: Run and verify migrations
        working-directory: arch-ai-backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_NAME: arkon_test
        run: |
          node run_migration.js
          node run_migration.js verify
          echo "✅ All migrations verified"
