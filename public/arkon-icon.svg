<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Circuit-style A -->
  <g fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer A shape -->
    <path d="M256 80 L100 420 L150 420 L180 340 L332 340 L362 420 L412 420 L256 80Z"/>
    <!-- Inner triangle -->
    <path d="M256 160 L200 300 L312 300 Z"/>
    <!-- Crossbar -->
    <line x1="170" y1="320" x2="342" y2="320"/>
    <!-- Circuit nodes -->
    <circle cx="256" cy="80" r="8" fill="white"/>
    <circle cx="100" cy="420" r="8" fill="white"/>
    <circle cx="412" cy="420" r="8" fill="white"/>
    <circle cx="180" cy="340" r="8" fill="white"/>
    <circle cx="332" cy="340" r="8" fill="white"/>
    <circle cx="200" cy="300" r="8" fill="white"/>
    <circle cx="312" cy="300" r="8" fill="white"/>
    <circle cx="256" cy="160" r="8" fill="white"/>
    <!-- Circuit traces -->
    <line x1="256" y1="80" x2="290" y2="80" stroke-width="4"/>
    <line x1="290" y1="80" x2="290" y2="120" stroke-width="4"/>
    <circle cx="290" cy="120" r="5" fill="white"/>
    <line x1="100" y1="420" x2="100" y2="450" stroke-width="4"/>
    <circle cx="100" cy="450" r="5" fill="white"/>
    <line x1="412" y1="420" x2="412" y2="450" stroke-width="4"/>
    <circle cx="412" cy="450" r="5" fill="white"/>
  </g>
</svg>
